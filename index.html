<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortaUrbana - VerdeCidade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <h1>HortaUrbana</h1>
        </nav>
    </header>

    <section id="tela-login">
        <header>
            <h2>Bem Vindo à HortaUrbana</h2>
            <p>Login</p>
        </header>

        <form>
            <fieldset>
                <legend>Identificação</legend>
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Digite seu Email" required>

                <label for="login-senha">Senha:</label>
                <input type="password" id="login-senha" placeholder="Digite sua senha" required>

                <button type="submit"><a href="dashboard.html">Entrar</a></button>
            </fieldset>
        </form>
    </section>

    <footer>
        <p>VerdeCidade - 2026</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>

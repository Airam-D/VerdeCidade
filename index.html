<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortaUrbana - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>

<body class="corpo-login">

    <main id="card-login-container">
        <!-- Lado Esquerdo: Identidade -->
        <section class="login-info">
            <div class="logo-circle">🌱</div>
            <h1 class="titulo-boas-vindas">Bem-vindo à <span>HortaUrbana</span></h1>
            <p class="subtitulo">Sua horta na palma da mão.</p>
        </section>

        <!-- Lado Direito: Formulário -->
        <section class="login-form-area">
            <h2 class="titulo-login">Login</h2>

            <form id="form-login">
                <div class="campo-grupo">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="nome@email.com" required>
                </div>

                <div class="campo-grupo">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••••" required>
                </div>

                <button type="button" class="btn-login-main" onclick="fazerLogin()">
                    Acessar Painel
                </button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>

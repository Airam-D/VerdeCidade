<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortaUrbana - Novo Plantio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>

<body class="corpo-cadastro">

    <header class="navbar-dashboard">
        <div class="header-content">
            <a href="dashboard.html" class="btn-voltar-topo">←</a>
            <h1 class="logo-dashboard">Novo <span>Plantio</span></h1>
            <div style="width: 50px;"></div> <!-- Equilíbrio visual -->
        </div>
    </header>

    <main class="container-cadastro">
        <section class="card-formulario">
            <div class="form-header">
                <h2>🌱 Informações do Cultivo</h2>
                <p>Preencha os dados abaixo para iniciar o rastreio do seu canteiro.</p>
            </div>

            <form id="form-plantio">
                <!-- Adicione este bloco que está faltando -->
                <div class="campo-grupo">
                    <label for="nome_canteiro">Nome do Canteiro</label>
                    <input type="text" id="nome_canteiro" placeholder="Ex: Canteiro Principal" required>
                </div>

                <div class="campo-grupo">
                    <label for="data_plantio">Data do Plantio</label>
                    <input type="date" id="data_plantio" required>
                </div>

                <div class="campo-linha">
                    <div class="campo-grupo">
                        <label for="tipo_hortalica">Hortaliça</label>
                        <select id="tipo_hortalica" required>
                            <option value="Alface">Alface (45 dias)</option>
                            <option value="Tomate">Tomate (90 dias)</option>
                        </select>
                    </div>
                    <div class="campo-grupo">
                        <label for="area_canteiro">Área (M²)</label>
                        <input type="number" id="area_canteiro" step="0.1" required>
                    </div>
                </div>

                <button type="submit" class="btn-principal">Confirmar Plantio</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
